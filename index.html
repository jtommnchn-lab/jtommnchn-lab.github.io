<style>

body{
  margin:0;

  overflow-x:hidden;
}

/* TOP BAR */

.topbar{
  position:sticky;
  top:0;
  z-index:9999;

  background:white;

  display:flex;
  justify-content:space-between;

}

.card.selected{

  opacity:1;

}

.card h3{

}

.select-btn:active{
  transform:scale(0.97);
}

/* ARROWS */

.carousel-btn{

  position:absolute;

  top:50%;

  transform:translateY(-50%);

  z-index:99999;

  width:48px;
  height:48px;

  border:none;

  border-radius:50%;

  background:rgba(0,0,0,0.75);

  color:white;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;

  font-size:18px;

  transition:0.2s;

  user-select:none;
}

.carousel-btn:hover{
  background:black;
}

.carousel-btn.left{
  left:8px;
}

.carousel-btn.right{
  right:8px;
}

@media(max-width:768px){

  .carousel-btn{
    width:42px;
    height:42px;
  }

  .card{
    flex:0 0 72%;

}

/* SELECTED */

.selected-box{

  display:none;

}

/* OTT */

#ottSection{

}

#ottSection h3{

}

.ott-cards{

  display:grid;

  grid-template-columns:repeat(2,1fr);

  gap:12px;

  margin-top:10px;
}

@media(max-width:768px){

  .ott-cards{
    grid-template-columns:1fr;

}

.ott-card{

  background:white;

  color:black;

.ott-card.active{

.ott-price{

/* FORM */

.form-section{

}

.form{

  max-width:420px;

}

.form h3{

}

input{

  width:100%;

  margin-top:14px;

  padding:13px;

  border:1px solid #ccc;

}

input.error{
  border:2px solid #e53935;
  background:#fff5f5;
}

.error-text{
  color:#e53935;
  font-size:12px;

}

.submit-btn{

  width:100%;

  margin-top:18px;

  border:none;

  border-radius:10px;

  padding:13px;

  background:#003a8f;

  color:white;

  font-weight:700;

  cursor:pointer;
}

/* BOTTOM BAR */

#bottomBar{
  display:none;
}

.bottom-bar{

  position:fixed;

  bottom:0;
  left:0;
  right:0;

  background:white;

  color:black;

  padding:12px;

  z-index:9999;

  box-shadow:0 -5px 18px rgba(0,0,0,0.2);
}

.price-line{

  text-align:center;

  color:#003a8f;

  font-size:22px;

  font-weight:700;

  margin-bottom:10px;
}

.bottom-bar button{

  width:100%;

  border:none;

  border-radius:12px;

  padding:14px;

  background:#25D366;

  color:white;

  font-size:16px;

  font-weight:700;

  cursor:pointer;

  box-shadow:0 0 18px rgba(37,211,102,0.5);
}

.bottom-bar button:disabled{
  background:#ccc;
  box-shadow:none;

}

/* LEAD PROMPT */

.lead-prompt{

  position:fixed;

  bottom:95px;

  left:50%;

  transform:translateX(-50%) translateY(20px);

  background:#25D366;

  color:white;

  padding:12px 18px;

  border-radius:30px;

  font-size:14px;

  font-weight:700;

  z-index:99999;

  opacity:0;

  transition:0.35s ease;

  pointer-events:none;
}

.lead-prompt.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

</style>

<div class="carousel-section">

  onclick="scrollPlans(-1)">

  <button class="carousel-btn right"

<div class="form-section" id="formSection">

    <button class="submit-btn"
    onclick="submitForm()">
      Submit Request

</div>

<!-- BOTTOM -->

<div id="bottomBar" class="bottom-bar">

  <div class="price-line" id="bottomPrice">

  <button onclick="submitForm()" disabled>
    Get Connection
  </button>

</div>

<!-- PROMPT -->

<div id="leadPrompt" class="lead-prompt">
  ✨ Enter name and contact details
</div>

<script>

let selectedPlanName = "";
let selectedBasePrice = 0;
let selectedOTTName = "None";
let selectedOTT = "none";

let planType = "monthly";

let userLat = "";
let userLng = "";

/* OTT */

const ottPlans = {

basic:{
  name:"OTT Basic",
  price:{
    monthly:151,
    quarterly:454,
    half:908,
    yearly:1817
  },
  apps:[
    "Zee5",
    "SonyLIV",
    "SunNxt",
    "Aha",
    "Discovery+"
  ]
},

plus:{
  name:"OTT Basic Plus",
  price:{
    monthly:216,
    quarterly:647,
    half:1295,
    yearly:2590
  },
  apps:[
    "JioHotstar",
    "Zee5",
    "SonyLIV",
    "SunNxt",
    "Aha"
  ]
},

premium:{
  name:"OTT Premium",
  price:{
    monthly:239,
    quarterly:718,
    half:1436,
    yearly:2873
  },
  apps:[
    "Amazon Prime",
    "JioHotstar",
    "Zee5",
    "SonyLIV",
    "SunNxt"
  ]
},

premiumplus:{
  name:"OTT Premium Plus",
  price:{
    monthly:282,
    quarterly:847,
    half:1695,
    yearly:3389
  },
  apps:[
    "Amazon Prime",
    "JioHotstar",
    "Zee5",
    "SonyLIV",
    "SunNxt"
  ]
}

};

/* LOGOS */

const ottLogos = {

"Zee5":"https://upload.wikimedia.org/wikipedia/commons/5/5a/Zee5-official-logo.jpeg",

"SonyLIV":"https://upload.wikimedia.org/wikipedia/commons/f/f7/SonyLIV_2020.png",

"SunNxt":"https://upload.wikimedia.org/wikipedia/en/thumb/d/d5/Sun_NXT_logo_small.png/250px-Sun_NXT_logo_small.png",

"Aha":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Aha_OTT_Logo.svg/500px-Aha_OTT_Logo.svg.png",

"Discovery+":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/2019_Discovery_logo.svg/960px-2019_Discovery_logo.svg.png",

"Amazon Prime":"https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png",

"JioHotstar":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/JioHotstar_2025.png/960px-JioHotstar_2025.png"

};

/* PLANS */

const plansData = [

{
  name:"Fibre Entry",
  speed:"25 Mbps",
  popular:false,
  price:{
    monthly:333,
    quarterly:1178,
    half:2356,
    yearly:4712
  }
},

{
  name:"Ghar Ka WiFi",
  speed:"40 Mbps",
  popular:false,
  price:{
    monthly:399,
    quarterly:1413,
    half:2826,
    yearly:5652
  }
},

{
  name:"Fibre Basic",
  speed:"60 Mbps",
  popular:false,
  price:{
    monthly:499,
    quarterly:1767,
    half:3533,
    yearly:7066
  }
},

{
  name:"Fibre Basic Plus",
  speed:"100 Mbps",
  popular:true,
  price:{
    monthly:599,
    quarterly:2121,
    half:4241,
    yearly:8482
  }
},

{
  name:"Fibre TB",
  speed:"150 Mbps",
  popular:false,
  price:{
    monthly:799,
    quarterly:2829,
    half:5657,
    yearly:9900
  }
},

{
  name:"Fibre Value Plus",
  speed:"150 Mbps",
  popular:false,
  price:{
    monthly:849,
    quarterly:3006,
    half:6011,
    yearly:10520
  }
},

{
  name:"Fibre Premium Plus",
  speed:"250 Mbps",
  popular:false,
  price:{
    monthly:1299,
    quarterly:4602,
    half:9197,
    yearly:18394
  }
}

];

/* INIT */

window.onload = function(){

  renderPlans();

  detectLocation();

  document.getElementById("name")
  .addEventListener("input",()=>{
    clearErrors();
    checkFormReady();
  });

  document.getElementById("phone")
  .addEventListener("input",()=>{
    clearErrors();
    checkFormReady();
  });

};

/* LOCATION */

function detectLocation(){

  const areaInput =
  document.getElementById("area");

  if(!navigator.geolocation){
    areaInput.value = "Chennai";
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos=>{

    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    try{

      const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`
      );

      const data = await res.json();

      areaInput.value =
      data.address.suburb ||
      data.address.neighbourhood ||
      data.address.city ||
      "Chennai";

    }catch{

      areaInput.value = "Chennai";

    }

  });

}

/* RENDER PLANS */

function renderPlans(){

  const container =
  document.getElementById("plans");

  container.innerHTML = "";

  plansData.forEach(p=>{

    let price = p.price[planType];

    let freeText = "";

    if(planType==="quarterly"){
      freeText = "🎁 7 Days FREE";
    }

    if(planType==="half"){
      freeText = "🎁 19 Days FREE";
    }

    if(planType==="yearly"){
      freeText = "🎁 1 Month FREE";
    }

    container.innerHTML += `

    <div class="card ${p.popular ? 'popular':''}"
    data-name="${p.name}"
    data-price="${price}"
    data-speed="${p.speed}">

      ${p.popular ?
      `<div class="badge">Most Popular</div>` : ''}

      ${freeText ?
      `<div class="badge">${freeText}</div>` : ''}

      <h3>${p.name}</h3>

      <h2>₹${price}</h2>

      <p>${p.speed}</p>

      <button class="select-btn">
        Select
      </button>

    </div>

    `;

  });

}

/* PLAN CLICK */

document.addEventListener("click",function(e){

  if(e.target.classList.contains("select-btn")){

    const card =
    e.target.closest(".card");

    selectPlan(card);

  }

});

/* SELECT PLAN */

function selectPlan(card){

  document.querySelectorAll(".card")
  .forEach(c=>c.classList.remove("selected"));

  card.classList.add("selected");

  selectedPlanName =
  card.dataset.name;

  selectedBasePrice =
  Number(card.dataset.price);

  document.getElementById("selectedBox")
  .style.display = "block";

  document.getElementById("selectedText")
  .innerHTML = `
  Total: ₹${selectedBasePrice}
  `;

  document.getElementById("bottomBar")
  .style.display = "block";

  updatePrice();

  renderOTT();

  document.getElementById("ottSection")
  .style.display = "block";

  setTimeout(()=>{
    document.getElementById("ottSection")
    .scrollIntoView({
      behavior:"smooth"
    });
  },150);

}

/* ARROWS */

function scrollPlans(dir){

  const container =
  document.getElementById("plans");

  const card =
  container.querySelector(".card");

  if(!card) return;

  const width =
  card.offsetWidth + 16;

  container.scrollBy({
    left:dir * width * 2,
    behavior:"smooth"
  });

}

/* OTT */

function renderOTT(){

  const container =
  document.getElementById("ottCards");

  container.innerHTML = "";

  container.innerHTML += `

  <div class="ott-card ${selectedOTT==='none' ? 'active':''}"
  onclick="selectOTTCard('none',this)">

    <div class="ott-title">
      🚫 No OTT
    </div>

    <div class="ott-price">
      Continue without OTT
    </div>

  </div>

  `;

  Object.keys(ottPlans).forEach(key=>{

    const p = ottPlans[key];

    let logos =
    p.apps.map(app=>{

      if(!ottLogos[app]) return "";

      return `
      <img src="${ottLogos[app]}">
      `;

    }).join("");

    container.innerHTML += `

    <div class="ott-card ${selectedOTT===key ? 'active':''}"
    onclick="selectOTTCard('${key}',this)">

      <div class="ott-title">
        ${p.name}
      </div>

      <div class="ott-price">
        ₹${p.price[planType]}
      </div>

      <div class="ott-grid">
        ${logos}
      </div>

    </div>

    `;

  });

}

/* SELECT OTT */

function selectOTTCard(type,el){

  selectedOTT = type;

  if(type==="none"){
    selectedOTTName = "None";
  }else{
    selectedOTTName =
    ottPlans[type].name;
  }

  document.querySelectorAll(".ott-card")
  .forEach(c=>c.classList.remove("active"));

  el.classList.add("active");

  updatePrice();

  checkFormReady();

  showLeadPrompt();

  setTimeout(()=>{

    document.getElementById("formSection")
    .scrollIntoView({
      behavior:"smooth",
      block:"center"
    });

  },250);

}

/* PRICE */

function updatePrice(){

  let ottPrice = 0;

  if(selectedOTT !== "none"){
    ottPrice =
    ottPlans[selectedOTT]
    .price[planType];
  }

  const total =
  selectedBasePrice + ottPrice;

  document.getElementById("bottomPrice")
  .innerHTML = `₹ ${total}`;

  document.getElementById("selectedText")
  .innerHTML = `
  Total: ₹${total}<br>
  <span style="font-size:12px">
  Base ₹${selectedBasePrice}
  ${ottPrice ? `+ OTT ₹${ottPrice}`:''}
  </span>
  `;

}

/* TYPE */

function setType(type,el){

  planType = type;

  document.querySelectorAll(".duration-card")
  .forEach(c=>c.classList.remove("active"));

  el.classList.add("active");

  selectedOTT = "none";
  selectedOTTName = "None";

  renderPlans();

  document.getElementById("ottSection")
  .style.display = "none";

  document.getElementById("selectedBox")
  .style.display = "none";

  document.getElementById("bottomBar")
  .style.display = "none";

}

/* LEAD PROMPT */

function showLeadPrompt(){

  const prompt =
  document.getElementById("leadPrompt");

  prompt.classList.add("show");

  setTimeout(()=>{
    prompt.classList.remove("show");
  },2500);

}

/* VALIDATION */

function clearErrors(){

  document.getElementById("name")
  .classList.remove("error");

  document.getElementById("phone")
  .classList.remove("error");

  document.getElementById("nameError")
  .innerText = "";

  document.getElementById("phoneError")
  .innerText = "";

}

function checkFormReady(){

  const btn =
  document.querySelector("#bottomBar button");

  if(
    selectedPlanName &&
    document.getElementById("name").value &&
    /^[6-9]\d{9}$/.test(
      document.getElementById("phone").value
    )
  ){
    btn.disabled = false;
  }else{
    btn.disabled = true;
  }

}

function validateForm(){

  let valid = true;

  const name =
  document.getElementById("name");

  const phone =
  document.getElementById("phone");

  clearErrors();

  if(!name.value.trim()){

    name.classList.add("error");

    document.getElementById("nameError")
    .innerText =
    "Please enter your name";

    valid = false;

  }

  else if(
    !/^[6-9]\d{9}$/.test(phone.value)
  ){

    phone.classList.add("error");

    document.getElementById("phoneError")
    .innerText =
    "Enter valid 10-digit mobile number";

    valid = false;

  }

  if(!selectedPlanName){

    alert("Please select a plan");

    return false;

  }

  return valid;

}

/* SUBMIT */

async function submitForm(){

  if(!validateForm()) return;

  const name =
  document.getElementById("name").value;

  const phone =
