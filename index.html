<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f4a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:white;
  color:black;
}
.logo{height:40px;}

.wa-btn{
  background:#25D366;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
}

/* HERO */
.hero{
  position:relative;
  height:clamp(260px,45vh,480px);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
    url('https://bsnlnanganallur.github.io/Banner-desktop.jpg') center/cover no-repeat;
  animation:zoomHero 12s ease-in-out infinite alternate;
}
@media(max-width:768px){
  .hero::before{
    background:
      linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)),
      url('https://bsnlnanganallur.github.io/Banner-mobile.jpg') center/contain no-repeat;
    background-color:#0b1f4a;
  }
}
@keyframes zoomHero{
  from{transform:scale(1);}
  to{transform:scale(1.08);}
}
.hero-content{
  position:relative;
  z-index:2;
  text-align:center;
}
.hero-btn{
  display:inline-block;
  padding:12px 20px;
  background:#25D366;
  border-radius:8px;
  color:white;
  text-decoration:none;
  margin-top:10px;
}

/* TYPE SWITCH */
.type-switch{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}
.type-btn{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}
.type-btn.active{
  background:#ff9800;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  margin:20px auto;
  gap:8px;
}
.tab{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}
.tab.active{
  background:white;
  color:#003a8f;
}

/* CAROUSEL */
.plans-wrapper{
  position:relative;
  max-width:1100px;
  margin:40px auto;
}
.plans{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding:20px;
  scroll-snap-type:x mandatory;
  scroll-padding:0 50%;
}
.plans::-webkit-scrollbar{display:none;}

.card{
  flex:0 0 220px;
  background:white;
  color:black;
  border-radius:12px;
  padding:14px;
  text-align:center;
  scroll-snap-align:center;
  transition:0.3s;
}
@media(max-width:768px){
  .card{flex:0 0 70%;}
}
.card.selected{
  transform:scale(1.1);
  border:3px solid #2e7d32;
}
.card.popular{
  border:2px solid orange;
}
.badge{
  background:#ff9800;
  color:white;
  padding:4px 8px;
  border-radius:4px;
  font-size:12px;
  margin-bottom:6px;
  display:inline-block;
}

/* FORM */
.form-section{
  padding:40px;
  display:flex;
  justify-content:center;
}
.form{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  width:100%;
  max-width:400px;
}
input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}
button{
  background:#003a8f;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="header">
  <img src="https://bsnlnanganallur.github.io/bsnl-logo.png" class="logo">
  <a href="https://wa.me/919447072230" class="wa-btn">WhatsApp</a>
</div>

<div class="hero">
  <div class="hero-content">
    <h1>Unlimited Fibre Internet</h1>
    <p>Plans starting ₹333</p>
    <a href="#formSection" class="hero-btn">Check Availability</a>
  </div>
</div>

<!-- TYPE SWITCH -->
<div class="type-switch">
  <button class="type-btn active" onclick="setCategory('nonott',this)">Non-OTT</button>
  <button class="type-btn" onclick="setCategory('ott',this)">OTT</button>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setType('monthly',this)">Monthly</button>
  <button class="tab" onclick="setType('quarterly',this)">Quarterly</button>
  <button class="tab" onclick="setType('half',this)">Half-Yearly</button>
  <button class="tab" onclick="setType('yearly',this)">Yearly</button>
</div>

<!-- CAROUSEL -->
<div class="plans-wrapper">
  <div class="plans" id="plans"></div>
</div>

<!-- FORM -->
<div class="form-section" id="formSection">
  <div class="form">
    <h3>Check Availability</h3>
    <input id="name" placeholder="Name">
    <input id="phone" placeholder="Mobile">
    <input id="area" placeholder="Area">
    <input type="hidden" id="planInput">
    <button onclick="submitForm()">Submit</button>
  </div>
</div>

<script>
let category="nonott",planType="monthly",selectedPlan="";

const plansData={
nonott:[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
{name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
{name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
{name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
{name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
{name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
{name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
],
ott:[
{name:"Fibre OTT",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
{name:"Ghar OTT",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
{name:"Fibre Basic OTT",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
{name:"Fibre Basic Plus OTT",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
{name:"Fibre TB OTT",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
{name:"Fibre Value Plus OTT",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
{name:"Fibre Premium Plus OTT",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
]
};

function render(){
  let plans=plansData[category];
  let c=document.getElementById("plans");
  c.innerHTML="";

  plans.forEach(p=>{
    let price=p.price[planType];

    let free="";
    if(planType==="quarterly") free="🎁 7 Days FREE";
    if(planType==="half") free="🎁 19 Days FREE";
    if(planType==="yearly") free="🎁 1 Month FREE";

    c.innerHTML+=`
    <div class="card ${p.popular?'popular':''}"
    onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">

    ${p.popular?'<div class="badge">Most Popular</div>':''}
    ${free?`<div class="badge">${free}</div>`:''}

    <h3>${p.name}</h3>
    <h2>₹${price}</h2>
    <p>${p.speed}</p>
    <button onclick="event.stopPropagation();
    selectPlan(this.closest('.card'),'${p.name}','${price}','${p.speed}')">
    Select</button>

    </div>`;
  });
}

function selectPlan(el,n,p,s){
  selectedPlan=`${n} ₹${p}`;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("planInput").value=selectedPlan;
}

function setType(t,el){
  planType=t;
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  render();
}

function setCategory(cat,el){
  category=cat;
  document.querySelectorAll(".type-btn").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  render();
}

async function submitForm(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let area=document.getElementById("area").value;
  let plan=document.getElementById("planInput").value;
  await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({name,phone,area,lat:userLat,lng:userLng,plan})
  });

  window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0APlan:${plan}`);
}

render();
</script>

</body>
</html>
