<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f4a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:white;
  color:black;
}
.logo{height:40px;}

.wa-btn{
  background:#25D366;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
}

/* HERO (FIXED) */
/* HERO DEFAULT (Desktop) */
.hero{
  width:100%;
  height:clamp(220px, 42vh, 420px);
  background:
    linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3)),
    url('https://jtommnchn-lab.github.io/Banner.jpg') center/cover no-repeat;
  border-bottom:2px solid rgba(255,255,255,0.1);
}

/* 📱 MOBILE FIX (Show full image) */
@media(max-width:768px){
  .hero{
    height:220px;
    background:
      #0b1f4a url('https://jtommnchn-lab.github.io/Banner.jpg') center/contain no-repeat;
  }
}
.ott-options{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  margin-top:10px;
}

.ott-options label{
  background:#ffffff20;
  padding:8px 12px;
  border-radius:20px;
  cursor:pointer;
}

#ottPreview{
  margin-top:12px;
}
/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  margin:20px auto;
  gap:8px;
}

.tab{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}

.tab.active{
  background:white;
  color:#003a8f;
}

/* CAROUSEL */
.plans-wrapper{
  position:relative;
  max-width:1100px;
  margin:40px auto;
}

.plans{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding:20px;
  min-height:260px;
  scroll-snap-type:x mandatory;
  scroll-behavior:smooth;
}

.plans::-webkit-scrollbar{display:none;}

.card{
  flex:0 0 220px;
  min-height:200px;
  background:white;
  color:black;
  border-radius:12px;
  padding:14px;
  text-align:center;
  scroll-snap-align:center;
  cursor:pointer;
  transition:0.3s ease;
}

@media(max-width:768px){
  .card{
    flex:0 0 70%;
  }
}

.card.selected{
  transform:scale(1.1) !important;
  border:3px solid #2e7d32;
  z-index:2;
}

.card.popular{
  border:2px solid #ff9800;
  box-shadow:0 0 20px rgba(255,152,0,0.6);
  transform:scale(1.05);
}
.ott-logos{
  display:flex;
  justify-content:center;
  gap:6px;
  margin-top:8px;
  flex-wrap:wrap;
}

.ott-logos img{
  height:28px;
  width:auto;
  background:white;
  padding:4px;
  border-radius:6px;
  object-fit:contain;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.more-btn{
  font-size:11px;
  color:#003a8f;
  cursor:pointer;
  margin-top:4px;
  display:block;
}
.badge{
  background:#ff9800;
  color:white;
  padding:4px 8px;
  border-radius:4px;
  font-size:12px;
  margin-bottom:8px;
  display:inline-block;
}

.ott-badge{
  background:#673ab7;
  color:white;
  font-size:11px;
  padding:3px 6px;
  border-radius:4px;
  margin-bottom:6px;
  display:inline-block;
}

/* EDGE FADE */
.plans-wrapper::before,
.plans-wrapper::after{
  content:"";
  position:absolute;
  top:0;
  width:40px;
  height:100%;
  z-index:5;
  pointer-events:none;
}
.plans-wrapper::before{
  left:0;
  background:linear-gradient(to right,#0b1f4a 40%, transparent);
}
.plans-wrapper::after{
  right:0;
  background:linear-gradient(to left,#0b1f4a 40%, transparent);
}

/* ARROWS */
.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  z-index:100;
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:rgba(0,0,0,0.7);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}
.carousel-btn.left{left:10px;}
.carousel-btn.right{right:10px;}

/* SELECTED */
.selected-box{
  display:none;
  text-align:center;
  background:#2e7d32;
  color:white;
  padding:12px;
  margin:15px auto;
  max-width:500px;
  border-radius:10px;
  font-weight:bold;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

/* FORM */
.form-section{
  padding:40px 15px;
  display:flex;
  justify-content:center;
}

.form{
  width:100%;
  max-width:420px;
  background:white;
  color:black;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:6px;
  background:#003a8f;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
.type-switch{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}

.type-btn{
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}

.type-btn.active{
  background:#ff9800;
  color:white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://jtommnchn-lab.github.io/bsnl-logo.png" class="logo">
  <a href="https://wa.me/919447072230" class="wa-btn">WhatsApp</a>
</div>

<!-- HERO -->
<div class="hero"></div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setType('monthly',this)">Monthly</button>
  <button class="tab" onclick="setType('quarterly',this)">Quarterly</button>
  <button class="tab" onclick="setType('half',this)">Half-Yearly</button>
  <button class="tab" onclick="setType('yearly',this)">Yearly</button>
</div>

<!-- CAROUSEL -->
<div class="plans-wrapper">
  <button class="carousel-btn left" onclick="scrollPlans(-1)">◀</button>
  <div class="plans" id="plans"></div>
  <button class="carousel-btn right" onclick="scrollPlans(1)">▶</button>
</div>

<div id="selectedBox" class="selected-box">
Selected Plan: <span id="selectedText"></span>
</div>
<div id="ottSection" style="display:none; text-align:center; margin:20px">
  <h3>🎬 Add OTT Pack (Optional)</h3>
  <div class="ott-options">
    <label>
      <input type="radio" name="ott" value="none" checked onclick="selectOTT('none')">
      No OTT
    </label>
    <label>
      <input type="radio" name="ott" value="basic" onclick="selectOTT('basic')">
      OTT Basic
    </label>
    <label>
      <input type="radio" name="ott" value="plus" onclick="selectOTT('plus')">
      OTT Basic Plus
    </label>
    <label>
      <input type="radio" name="ott" value="premium" onclick="selectOTT('premium')">
      OTT Premium
    </label>
    <label>
      <input type="radio" name="ott" value="premiumplus" onclick="selectOTT('premiumplus')">
      OTT Premium Plus
    </label>
  </div>
  <div id="ottPreview"></div>
</div>
<!-- FORM -->
<div class="form-section" id="formSection">
  <div class="form">
    <h3>Check Availability</h3>
    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Mobile Number">
    <input id="area" placeholder="Detecting your area...">
    <input type="hidden" id="planInput">
    <button onclick="submitForm()">Submit Request</button>
  </div>
</div>

<script>
let selectedPlan="",planType="monthly",userLat="",userLng="";
let isOTT = false;  
let selectedOTT = "none";

const ottPlans = {
basic:{
  name:"OTT Basic",
  price:{monthly:151,quarterly:454,half:908,yearly:1817},
  apps:["Zee5","SonyLIV","SunNxt","Aha","Discovery+"]
},
plus:{
  name:"OTT Basic Plus",
  price:{monthly:216,quarterly:647,half:1295,yearly:2590},
  apps:["JioHotstar","Zee5","SonyLIV","SunNxt","Aha"]
},
premium:{
  name:"OTT Premium",
  price:{monthly:239,quarterly:718,half:1436,yearly:2873},
  apps:["Amazon Prime","JioHotstar","Zee5","SonyLIV","SunNxt"]
},
premiumplus:{
  name:"OTT Premium Plus",
  price:{monthly:282,quarterly:847,half:1695,yearly:3389},
  apps:["Amazon Prime","JioHotstar","Zee5","SonyLIV","SunNxt"]
}
}; 
const ottLogos = {
"Zee5":"https://upload.wikimedia.org/wikipedia/commons/5/5a/Zee5-official-logo.jpeg",
"SonyLIV":"https://upload.wikimedia.org/wikipedia/commons/f/f7/SonyLIV_2020.png",
"SunNxt":"https://upload.wikimedia.org/wikipedia/en/thumb/d/d5/Sun_NXT_logo_small.png/250px-Sun_NXT_logo_small.png",
"Aha":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Aha_OTT_Logo.svg/500px-Aha_OTT_Logo.svg.png",
"Discovery+":"https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/2019_Discovery_logo.svg/960px-2019_Discovery_logo.svg.png",
"Hungama":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b5/Hungama_logo.png/960px-Hungama_logo.png",
"Fancode":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Fancode.png/960px-Fancode.png",
"ShemarooMe":"https://upload.wikimedia.org/wikipedia/en/b/b9/Shemaroo_Entertainment_Logo.png",
"ShortsTV":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Shorts_logo.jpg/960px-Shorts_logo.jpg",
"Amazon Prime":"https://upload.wikimedia.org/wikipedia/commons/f/f1/Prime_Video.png",
"JioHotstar":"https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/JioHotstar_2025.png/960px-JioHotstar_2025.png"
};  
const plansData = {
nonott:[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
{name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
{name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
{name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
{name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
{name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
{name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
],

ott:[
{name:"OTT Basic",apps:["Zee5","SonyLIV","SunNxt","Aha","Discovery+"],
price:{monthly:159,quarterly:454,half:908,yearly:1817}},
{name:"OTT Basic Plus",apps:["JioHotstar","Zee5","SonyLIV","SunNxt","Aha"],
price:{monthly:224,quarterly:647,half:1295,yearly:2590}},
{name:"OTT Premium",apps:["Amazon Prime","JioHotstar","Zee5","SonyLIV","SunNxt"],
price:{monthly:248,quarterly:718,half:1436,yearly:2873},popular:true},
{name:"OTT Premium Plus",apps:["Amazon Prime","JioHotstar","Zee5","SonyLIV","SunNxt"],
price:{monthly:289,quarterly:847,half:1695,yearly:3389}}
]
};  


window.onload = function(){

  render();
  detectLocation();

  // ✅ Attach ONCE (correct place)
  const plansContainer = document.getElementById("plans");

  let scrollTimeout;

  plansContainer.addEventListener("scroll", () => {

    clearTimeout(scrollTimeout);

    scrollTimeout = setTimeout(() => {
      autoSelectCenter();
    }, 120);

  });

}

 
function detectLocation(){
  const areaInput = document.getElementById("area");

  if(!navigator.geolocation){
    areaInput.value = "Chennai";
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
      const data = await res.json();

      areaInput.value =
        data.address.suburb ||
        data.address.neighbourhood ||
        data.address.city ||
        "Chennai";
    } catch {
      areaInput.value = "Chennai";
    }
  });
}

function render(){
  let c = document.getElementById("plans");
  c.innerHTML = "";
  let plans = plansData.nonott;   // ✅ ONLY INTERNET PLANS
  plans.forEach(p=>{
    let basePrice = p.price[planType];
    // ✅ FIX: declare properly
    let freeText = "";
    if(planType === "quarterly") freeText = "🎁 7 Days FREE";
    if(planType === "half") freeText = "🎁 19 Days FREE";
    if(planType === "yearly") freeText = "🎁 1 Month FREE";

    c.innerHTML += `
    <div class="card ${p.popular ? 'popular' : ''}"
    onclick="selectPlan(this,'${p.name}','${basePrice}','${p.speed}')">

      ${p.popular ? '<div class="badge">Most Popular</div>' : ''}
      ${freeText ? `<div class="badge">${freeText}</div>` : ''}

      <h3>${p.name}</h3>
      <h2>₹${basePrice}</h2>
      <p>${p.speed}</p>
      <button onclick="event.stopPropagation();
      selectPlan(this.closest('.card'),'${p.name}','${basePrice}','${p.speed}')">
      Select</button>
    </div>`;
  });
  setTimeout(centerPopular,150);
}

function centerCard(el){
  const container = document.getElementById("plans");
  const cardRect = el.getBoundingClientRect();
  const containerRect = container.getBoundingClientRect();
  const offset =
    (cardRect.left - containerRect.left) -
    (container.offsetWidth / 2) +
    (cardRect.width / 2);
  container.scrollBy({
    left: offset,
    behavior: "smooth"
  });
}

function centerPopular(){
  const popularCard = document.querySelector(".popular");
  if(popularCard) popularCard.click();
}

function selectPlan(el,n,p,s){
  selectedPlan = `${n} - ₹${p} (${s})`;

  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
  document.getElementById("ottSection").style.display="block";
  document.getElementById("selectedBox").style.display="block";
  document.getElementById("selectedText").innerText=selectedPlan;
  document.getElementById("planInput").value=selectedPlan;
  centerCard(el);
}

function scrollPlans(dir){
  const container = document.getElementById("plans");
  const cardWidth = container.querySelector(".card").offsetWidth + 16;
  container.scrollBy({
    left: dir * cardWidth,
    behavior:"smooth"
  });
}

function autoSelectCenter(){
  const cards = document.querySelectorAll(".card");
  const container = document.getElementById("plans");
  let closest = null;
  let minDistance = Infinity;
  const center = container.offsetWidth / 2;

  cards.forEach(card=>{
    const cardCenter =
      card.offsetLeft - container.scrollLeft + (card.offsetWidth / 2);
    const dist = Math.abs(center - cardCenter);

    if(dist < minDistance){
      minDistance = dist;
      closest = card;
    }
  });

  if(closest){
    closest.click();
  }
}
function selectOTT(type){
  selectedOTT = type;
  if(type === "none"){
    document.getElementById("ottPreview").innerHTML = "";
    updatePrice();
    return;
  }
  let plan = ottPlans[type];
  let logos = plan.apps.map(app=>{
    return `<img src="${ottLogos[app]}" style="height:22px;margin:2px">`;
  }).join("");

  document.getElementById("ottPreview").innerHTML = `
    <p><b>${plan.name}</b></p>
    <div>${logos}</div>
  `;
  updatePrice();
}

function updatePrice(){
  if(!selectedPlan) return;
  let base = parseInt(selectedPlan.match(/₹(\d+)/)[1]);
  let ottPrice = 0;
  if(selectedOTT !== "none"){
    ottPrice = ottPlans[selectedOTT].price[planType];
  }
  let total = base + ottPrice;
  document.getElementById("selectedText").innerText =
    `Total: ₹${total} (Base ₹${base} + OTT ₹${ottPrice})`;

  document.getElementById("planInput").value =
    `₹${total} | ${selectedPlan} | OTT: ${selectedOTT}`;
}
  
function showApps(apps){
  const list = document.getElementById("appList");
  list.innerHTML = apps.map(app=>`<p>• ${app}</p>`).join("");
  document.getElementById("appPopup").style.display="flex";
}

function closePopup(){
  document.getElementById("appPopup").style.display="none";
}
  
  function setType(type, el){
  // update selected plan type
  planType = type;
  // toggle active button UI
  document.querySelectorAll(".tab")
    .forEach(btn => btn.classList.remove("active"));
  el.classList.add("active");
  // re-render plans
  render();
}
  
async function submitForm(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let area=document.getElementById("area").value;
  let plan=document.getElementById("planInput").value;

  await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({name,phone,area,lat:userLat,lng:userLng,plan})
  });

  window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0APlan:${plan}`);
}
</script>
<div id="appPopup" style="display:none;
position:fixed;inset:0;
background:rgba(0,0,0,0.7);
z-index:999;
align-items:center;
justify-content:center;">

  <div style="background:white;color:black;
  padding:20px;border-radius:10px;
  max-width:300px;width:90%;
  max-height:70vh;overflow:auto;">

    <h3>Included OTT Apps</h3>
    <div id="appList"></div>

    <button onclick="closePopup()">Close</button>
  </div>
</div>
</body>
</html>
