<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(#eef3ff,#ffffff);
}

/* HEADER */
.header{
  position:sticky;top:0;z-index:1000;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;
}

.header-left{display:flex;align-items:center;gap:10px;}
.logo{height:40px;}

.brand .title{color:#003a8f;font-weight:600;}
.brand .subtitle{font-size:12px;color:#666;}

.header-right{display:flex;gap:10px;}
.wa-btn{background:#25D366;color:white;padding:8px 14px;border-radius:6px;text-decoration:none;}

/* HERO */
.hero{
  background:
    linear-gradient(135deg, rgba(0,58,143,0.85), rgba(0,91,234,0.9)),
    url('https://images.pexels.com/photos/325229/pexels-photo-325229.jpeg');
  background-size:cover;text-align:center;
}

.hero h1{font-size:38px;margin:0;}
.cta{background:#ff6f00;padding:14px 26px;border-radius:8px;color:white;text-decoration:none;margin-top:20px;display:inline-block;}

/* FEATURES */
.features{
  display:flex;justify-content:center;gap:20px;
  background:white;margin-top:-30px;padding:15px;
  border-radius:12px;max-width:800px;margin-left:auto;margin-right:auto;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* SECTION */
.section{
  background:
    linear-gradient(rgba(255,255,255,0.95), rgba(238,243,255,0.95)),
    url('https://images.pexels.com/photos/1148820/pexels-photo-1148820.jpeg');
  background-size: cover;
  background-position: center;
}

.container{max-width:1100px;margin:auto;padding:40px 20px;}

/* TOGGLE */
.toggle{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.toggle button{padding:10px;border:none;background:#dfe7ff;border-radius:6px;}
.toggle .active{background:#003a8f;color:white;}

/* PLANS */
.plans{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}

.card{
  background:white;border-radius:18px;padding:22px;width:260px;
  text-align:center;box-shadow:0 12px 30px rgba(0,0,0,0.08);
  cursor:pointer;transition:0.3s;
}

.card:hover{transform:translateY(-6px);}
.card.popular{border:2px solid #ff6f00;}
.card.selected{border:2px solid #2e7d32;}

.price{font-size:26px;color:#003a8f;font-weight:bold;}
.speed{font-weight:bold;margin:10px 0;}

.badge{background:#ff6f00;color:white;font-size:12px;padding:4px;border-radius:4px;}

.select-btn{
  margin-top:10px;width:100%;
  background:#003a8f;color:white;padding:10px;
  border:none;border-radius:6px;
}

/* SELECTED PLAN BOX */
.selected-box{
  display:none;
  background:#e8f5e9;
  max-width:400px;margin:20px auto;
  padding:12px;border-radius:8px;
  text-align:center;color:#2e7d32;font-weight:bold;
}

/* FORM */
.form{
  background:white;padding:25px;border-radius:12px;
  max-width:400px;margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,button{width:100%;padding:12px;margin-top:10px;border-radius:6px;border:1px solid #ddd;}
button{background:#003a8f;color:white;border:none;font-weight:bold;}

footer{background:#003a8f;color:white;text-align:center;padding:15px;}

.whatsapp{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:14px;border-radius:50%;}
</style>
</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="header-left">
<img src="https://jtommnchn-lab.github.io/bsnl-logo.png" class="logo">
<div class="brand">
<div class="title">BSNL Bharat Fibre</div>
<div class="subtitle">Chennai</div>
</div>
</div>

<div class="header-right">
<a href="https://wa.me/919447072230" class="wa-btn">WhatsApp</a>
</div>
</header>

<!-- HERO -->
<div class="hero">
<h1>Ultra Fast Fibre Internet</h1>
<p>Unlimited Data | Free Voice | Reliable Network</p>
<a class="cta" href="https://wa.me/919447072230">Book Now</a>
</div>

<!-- FEATURES -->
<div class="features">
<div>⚡ 250 Mbps</div>
<div>🌐 Unlimited</div>
<div>📞 Free Calls</div>
<div>🏠 Home Ready</div>
</div>

<!-- PLANS -->
<div class="section">
<div class="container">
<h2 style="text-align:center;">Choose Plan</h2>

<div class="toggle">
<button onclick="setType('monthly',this)" class="active">Monthly</button>
<button onclick="setType('quarterly',this)">Quarterly</button>
<button onclick="setType('half',this)">Half-Yearly</button>
<button onclick="setType('yearly',this)">Yearly</button>
</div>

<div class="plans" id="plansBox"></div>
</div>
</div>

<!-- SELECTED PLAN -->
<div id="selectedBox" class="selected-box">
Selected Plan: <span id="selectedText"></span>
</div>

<!-- FORM -->
<div class="container" id="availability">
<h2 style="text-align:center;">Check Availability</h2>

<div class="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="area" placeholder="Detecting location...">
<input type="hidden" id="planInput">
<button onclick="submitForm()">Submit</button>
</div>
</div>

<footer>BSNL Bharat Fibre Chennai</footer>

<a class="whatsapp" href="https://wa.me/919447072230">💬</a>

<script>
let selectedPlan="";
let planType="monthly";
let userLat="",userLng="";

const plans=[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

function setType(t,el){
planType=t;
document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

function render(){
let c=document.getElementById("plansBox");
c.innerHTML="";
plans.forEach(p=>{
let price=p.price[planType];

c.innerHTML+=`
<div class="card ${p.popular?'popular':''}">
${p.popular?'<div class="badge">Most Popular</div>':''}
<h3>${p.name}</h3>
<div class="price">₹${price}</div>
<div class="speed">${p.speed}</div>

<button class="select-btn"
onclick="selectPlan(this.closest('.card'),'${p.name}','${price}','${p.speed}')">
Select Plan
</button>
</div>`;
});
}

function selectPlan(el,n,p,s){
selectedPlan=`${n} - ₹${p} (${s})`;
document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
el.classList.add("selected");

document.getElementById("selectedBox").style.display="block";
document.getElementById("selectedText").innerText=selectedPlan;
document.getElementById("planInput").value=selectedPlan;

document.getElementById("availability").scrollIntoView({behavior:"smooth"});
}

render();

/* LOCATION */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
let data=await res.json();
document.getElementById("area").value=data.address.suburb||data.address.city||"Chennai";
}catch{}
});
}

/* SUBMIT */
async function submitForm(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let area=document.getElementById("area").value;
let plan=document.getElementById("planInput").value;

if(!name||!phone){alert("Fill details");return;}
if(!plan){alert("Select plan");return;}

await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name,phone,area,
lat:userLat,lng:userLng,
planType,selectedPlan:plan
})
});

window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0AArea:${area}%0APlan:${plan}`);
}
</script>

</body>
</html>
