<body>

<!-- HEADER -->
<header class="header">
<div class="header-left">
<img src="./bsnl-logo.png" class="logo">
<div class="brand">
<div class="title">BSNL Bharat Fibre</div>
<div class="subtitle">Chennai</div>
</div>
</div>

<div class="header-right">
<a href="tel:9447072230" class="call-btn">📞 Call</a>

<!-- HERO -->
<div class="hero">
<h1>Ultra Fast BSNL Fibre</h1>
<p>Unlimited Data | Free Voice | Reliable Network</p>
<a class="cta" href="https://wa.me/919447072230">Book Now</a>
</div>

<!-- FEATURES -->
<div class="features">
<div>⚡ Up to 250 Mbps</div>
<div>📶 Unlimited Data</div>
<div>📞 Free Voice Calls</div>
</div>

<!-- PLANS -->
<div class="section">
<div class="container" id="plans">

<h2 style="text-align:center;">Choose Your Plan</h2>

<div class="toggle">
<button onclick="setType('monthly',this)" class="active">Monthly</button>
<button onclick="setType('quarterly',this)">Quarterly</button>
<button onclick="setType('half',this)">Half-Yearly</button>
<button onclick="setType('yearly',this)">Yearly</button>
</div>

<div class="plans" id="plansBox"></div>

</div>
</div>

<!-- FORM -->
<div class="container" id="availability">
<h2 style="text-align:center;">Check Availability</h2>

<div class="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile Number">
<input id="area" placeholder="Detecting location...">
<button onclick="submitForm()">Submit</button>
</div>
</div>

<footer>
BSNL Bharat Fibre Chennai | 9447072230
</footer>

<a class="whatsapp" href="https://wa.me/919447072230">💬</a>

<script>
let selectedPlan="";
let planType="monthly";
let userLat="",userLng="";

/* PLANS */
const plans=[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

function setType(t,el){
planType=t;
document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

function render(){
let c=document.getElementById("plansBox");
c.innerHTML="";
plans.forEach(p=>{
let price=p.price[planType];
c.innerHTML+=`
<div class="card ${p.popular?'popular':''}"
onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">
${p.popular?'<div class="badge">Most Popular</div>':''}
<h3>${p.name}</h3>
<h2>₹${price}</h2>
<p>${p.speed}</p>
</div>`;
});
}

function selectPlan(el,n,p,s){
selectedPlan=`${n} - ₹${p} (${s})`;
document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
el.classList.add("selected");
}

render();

/* LOCATION */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
let data=await res.json();
document.getElementById("area").value=data.address.suburb||data.address.city||"Chennai";
}catch{}
});
}

/* SUBMIT */
async function submitForm(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let area=document.getElementById("area").value;

if(!name||!phone){alert("Fill details");return;}
if(!selectedPlan){alert("Select plan");return;}

gtag('event','conversion',{'send_to':'AW-XXXXXXXXX/FORM_LABEL'});

await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name,phone,area,
lat:userLat,lng:userLng,
planType,selectedPlan
})
});

window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0AArea:${area}%0APlan:${selectedPlan}`);
}

/* WHATSAPP TRACK */
function trackWhatsApp(){
gtag('event','conversion',{'send_to':'AW-XXXXXXXXX/WHATSAPP_LABEL'});
}

/* SCROLL EFFECT */
window.addEventListener("scroll",()=>{
document.querySelector(".header").classList.toggle("scrolled",window.scrollY>10);
});
</script>

</body>
