<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f4a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:white;
  color:black;
}
.logo{height:40px;}

.wa-btn{
  background:#25D366;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
}

/* ================= HERO FIXED ================= */

.hero{
  width:100%;
  height:clamp(180px, 42vh, 420px);
  display:flex;
  background:
    linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3)),
    url('./Banner.jpg');
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#0b1f4a;
}

.hero-img{
  width:100%;
  height:100%;
  object-fit:contain;          /* 👈 KEY FIX */
  object-position:center;
}

/* Mobile fine-tune */
@media(max-width:768px){
  .hero{
    height:260px;
  }
  .hero-img{
    object-position:top center;
  }
}

/* ================= TABS ================= */

.tabs{
  display:flex;
  justify-content:center;
  margin:20px auto;
  gap:8px;
}

.tab{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}

.tab.active{
  background:white;
  color:#003a8f;
}

/* ================= CAROUSEL (UNCHANGED) ================= */

.plans-wrapper{
  position:relative;
  max-width:1100px;
  margin:auto;
}

.plans{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding:20px 20px;   /* 👈 space for arrows */
  min-height:260px;   /* 👈 CRITICAL FIX */
  scroll-snap-type:x mandatory;   /* 👈 SNAP ENABLE */
  scroll-behavior:smooth;
  align-items:stretch;
}

.plans::-webkit-scrollbar{display:none;}

.card{
  flex:0 0 75%;  /* KEY FIX for mobile*/
  max-width:220px;
  min-height:200px;
  background:white;
  color:black;
  border-radius:12px;
  padding:14px;
  text-align:center;
  scroll-snap-align:center;
  cursor:pointer;
  transition:0.3s ease;
}
  @media(min-width:768px){
    .card{
      flex:0 0 240px;
    }
  }

.card.selected{
  transform:scale(1.1) !important;
  border:3px solid #2e7d32;
  z-index:2;
}

.card.popular{
  border:2px solid #ff9800;
  box-shadow:0 0 20px rgba(255,152,0,0.6);
  transform:scale(1.05);
}

.badge{
  background:#ff9800;
  color:white;
  padding:4px 8px;
  border-radius:4px;
  font-size:12px;
  margin-bottom:8px;
  display:inline-block;
}

 .plans-wrapper::before,
 .plans-wrapper::after{
    content:"";
    position:absolute;
    top:0;
    width:40px;
    height:100%;
    z-index:5;
    pointer-events:none;
 }
.plans-wrapper::before{
    left:0;
    background:linear-gradient(to
      right,#0b1f4a,transparent);
}

  .plans-wrapper::after
    right:0;
    background:linear-gradient(to
      left,#0b1f4a,transparent);
}
.plans-wrapper{
  position:relative;
  max-width:1100px;
  margin:40px auto;
  display:block;   /* 👈 ensures container expands */
}
/* ARROWS */
.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  z-index:100;

  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  cursor:pointer;

  background:rgba(0,0,0,0.7);
  color:white;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* PUSH OUTSIDE */
.carousel-btn.left{
  left:10px;
}

.carousel-btn.right{
  right:10px;
}
/* ================= SELECTED ================= */

.selected-box{
  display:none;
  text-align:center;
  background:#dff0d8;
  color:#2e7d32;
  padding:10px;
}

/* ================= FORM ================= */

.form-section{
  padding:40px 15px;
  display:flex;
  justify-content:center;
}

.form{
  width:100%;
  max-width:420px;
  background:white;
  color:black;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  overflow:hidden; 
}

.form h3{
  margin-top:0;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:6px;
  background:#003a8f;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://jtommnchn-lab.github.io/bsnl-logo.png" class="logo">
  <a href="https://wa.me/919447072230" class="wa-btn">WhatsApp</a>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://jtommnchn-lab.github.io/Banner.jpg" class="hero-img">
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setType('monthly',this)">Monthly</button>
  <button class="tab" onclick="setType('quarterly',this)">Quarterly</button>
  <button class="tab" onclick="setType('half',this)">Half-Yearly</button>
  <button class="tab" onclick="setType('yearly',this)">Yearly</button>
</div>

<!-- CAROUSEL (UNCHANGED) -->
<div class="plans-wrapper">
<button class="carousel-btn left" onclick="scrollPlans(-1)">◀</button>
<div class="plans" id="plans"></div>
<button class="carousel-btn right" onclick="scrollPlans(1)">▶</button>
</div>

<div id="selectedBox" class="selected-box">
Selected Plan: <span id="selectedText"></span>
</div>

<!-- FORM -->
<div class="form-section" id="formSection">
  <div class="form">
    <h3>Check Availability</h3>

    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Mobile Number">
    <input id="area" placeholder="Detecting your area...">

    <input type="hidden" id="planInput">

    <button onclick="submitForm()">Submit Request</button>
  </div>
</div>

<script>
let selectedPlan="",planType="monthly",userLat="",userLng="";

const plans=[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

document.getElementById("plans").addEventListener("scroll", () => {
  updateCenterScale();
});
  
window.onload = function(){
  render();
  detectLocation();   // 👈 VERY IMPORTANT
}
  
function detectLocation(){

  const areaInput = document.getElementById("area");

  if(!navigator.geolocation){
    areaInput.value = "Chennai";
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {

    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    try{
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`
      );

      const data = await res.json();

      areaInput.value =
        data.address.suburb ||
        data.address.neighbourhood ||
        data.address.city ||
        "Chennai";

    } catch (e){
      areaInput.value = "Chennai";
    }

  }, () => {
    areaInput.value = "Chennai";
  });
}
function render(){

  let c = document.getElementById("plans");
  c.innerHTML = "";

  plans.forEach(p=>{

    let price = p.price[planType] || p.price.monthly;

    c.innerHTML += `
    <div class="card"
    onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">

      ${p.popular ? '<div class="badge">Most Popular</div>' : ''}

      <h3>${p.name}</h3>
      <h2>₹${price}</h2>
      <p>${p.speed}</p>

      <button onclick="event.stopPropagation();
      selectPlan(this.closest('.card'),'${p.name}','${price}','${p.speed}')">
      Select</button>

    </div>`;
  });
  setTimeout(()=>{
  centerPopular();
  updateCenterScale();
}, 150);
}

function centerCard(el){

  const container = document.getElementById("plans");

  const scrollLeft =
    el.offsetLeft -
    (container.offsetWidth / 2) +
    (el.offsetWidth / 2);

  container.scrollTo({
    left: scrollLeft,
    behavior: "smooth"
  });
}
  
function centerPopular(){

  const popularCard = document.querySelector(".card.popular");
  if(!popularCard) return;

  const p = plans.find(x => x.popular);
  const price = p.price[planType] || p.price.monthly;

  // ONLY this (no extra centerCard call)
  selectPlan(popularCard, p.name, price, p.speed);
}
  
function selectPlan(el,n,p,s){

  selectedPlan = `${n} - ₹${p} (${s})`;

  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");

  document.getElementById("selectedBox").style.display="block";
  document.getElementById("selectedText").innerText=selectedPlan;
  document.getElementById("planInput").value=selectedPlan;

  // 🔥 CENTER CARD
  centerCard(el);

  // scroll to form
  setTimeout(()=>{
    document.getElementById("formSection").scrollIntoView({
      behavior:"smooth"
    });
  }, 300);
}
function updateCenterScale(){

  const cards = document.querySelectorAll(".card");
  const container = document.getElementById("plans");

  const containerCenter = container.offsetWidth / 2;

  cards.forEach(card => {

    const cardCenter =
      card.offsetLeft - container.scrollLeft + (card.offsetWidth / 2);

    const distance = Math.abs(containerCenter - cardCenter);

    let scale = 1 - (distance/600);  //smooth scaling

    scale = Mat.max(0.9, Math.min(1.08, scale));
      card.style.transform = `scale(${scale})`;
      card.style.zIndex = Math.round(scale * 10);

  });
}
  
function scrollPlans(dir){
document.getElementById("plans").scrollBy({left:dir*250,behavior:"smooth"});
}

function setType(t,el){
planType=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
render();
}

/* LOCATION */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
});
}

/* SUBMIT */
async function submitForm(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let area=document.getElementById("area").value;
let plan=document.getElementById("planInput").value;

await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({name,phone,area,lat:userLat,lng:userLng,plan})
});

window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0APlan:${plan}`);
}
</script>

</body>
</html>
