<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSNL Fibre Chennai</title>

<style>
body {margin:0;font-family:Segoe UI;background:#f4f6f9;}

.hero {
  background:linear-gradient(135deg,#001f5b,#005bea);
  color:#fff;text-align:center;padding:60px 20px;
}

.cta-btn {
  background:#25D366;color:#fff;padding:12px 20px;
  border-radius:30px;text-decoration:none;display:inline-block;margin-top:15px;
}

.container {padding:40px 20px;max-width:1100px;margin:auto;}

.plans {display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}

.card {
  background:#fff;padding:20px;border-radius:15px;width:260px;
  text-align:center;box-shadow:0 10px 25px rgba(0,0,0,0.08);
  cursor:pointer;
}

.card.popular {border:2px solid #007bff;}
.card.selected {border:3px solid #25D366;}

.badge {
  background:#ffcc00;padding:5px 10px;border-radius:20px;font-size:12px;
}

.form-box {
  background:#fff;padding:25px;border-radius:15px;
  max-width:400px;margin:auto;
}

input,button {
  width:100%;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ddd;
}

button {background:#001f5b;color:#fff;font-weight:bold;border:none;}

footer {background:#111;color:#fff;text-align:center;padding:15px;}

.whatsapp {
  position:fixed;bottom:20px;right:20px;background:#25D366;
  color:#fff;padding:15px;border-radius:50%;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Ultra Fast Fibre Internet in Chennai</h1>
  <p>Unlimited Data | Free Voice | Quick Installation</p>
  <a class="cta-btn" href="https://wa.me/919447072230">WhatsApp Now</a>
</div>

<div class="container">
  <h2 style="text-align:center;">Plans</h2>

  <div style="text-align:center;margin-bottom:20px;">
    <select id="planType" onchange="updatePlans()">
      <option value="monthly">Monthly</option>
      <option value="quarterly">Quarterly</option>
      <option value="half">Half-Yearly</option>
      <option value="yearly">Yearly</option>
    </select>
  </div>

  <div class="plans" id="plansContainer"></div>
</div>

<div class="container">
  <h2 style="text-align:center;">Check Availability</h2>

  <div class="form-box">
    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Mobile Number">
    <input id="area" placeholder="Detecting your area...">
    <button onclick="submitForm()">Submit</button>
  </div>
</div>

<footer>
  Chennai Fibre | WhatsApp: 9447072230
</footer>

<a class="whatsapp" href="https://wa.me/919447072230">💬</a>

<script>
let selectedPlan = "";

const plans = [
 {name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

function updatePlans(){
  let type=document.getElementById("planType").value;
  let container=document.getElementById("plansContainer");
  container.innerHTML="";

  plans.forEach(p=>{
    let price=p.price[type];

    container.innerHTML+=`
      <div class="card ${p.popular?'popular':''}"
           onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">

        ${p.popular?'<div class="badge">🔥 Most Popular</div>':''}

        <h3>${p.name}</h3>
        <h2>₹${price}</h2>
        <p>${p.speed}</p>
      </div>
    `;
  });
}

function selectPlan(el,name,price,speed){
  selectedPlan=`${name} - ₹${price} (${speed})`;

  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
}

updatePlans();

/* AREA AUTO */
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&format=json`);
      let data=await res.json();
      document.getElementById("area").value =
        data.address.suburb || data.address.city || "Chennai";
    }catch{
      document.getElementById("area").value="Chennai";
    }
  });
}

/* SUBMIT */
async function submitForm(){
  let name=document.getElementById("name").value;
  let phone=document.getElementById("phone").value;
  let area=document.getElementById("area").value;
  let planType=document.getElementById("planType").value;

  if(!name||!phone){alert("Fill details");return;}
  if(!selectedPlan){alert("Select a plan");return;}

  await fetch("https://script.google.com/macros/s/AKfycbz4_VvgdYNNfJWQlPsmisOeiNgWUlBMUFIdGk8B8SBSRY6JtxV6if5Q8SEOOnH9G9i3rw/exec",{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({name,phone,area,planType,selectedPlan})
  });

  let msg=`Name:${name}%0APhone:${phone}%0AArea:${area}%0APlan:${selectedPlan}`;
  window.open(`https://wa.me/919447072230?text=${msg}`);
}
</script>

</body>
</html>
