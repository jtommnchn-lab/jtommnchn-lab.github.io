<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f4a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:white;
  color:black;
  margin:10px;
  border-radius:12px;
}

.logo{height:40px;}

.wa-btn{
  background:#25D366;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
}

/* HERO */
.hero{
  background:
    linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.3)),
    url('./Banner.jpg');
   background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  padding: 100px 20px;
  text-align:center;
}
  @media (max-width:768px){

  .hero{
    background-size: contain;   /* show full image */
    background-position: top;
    padding: 140px 20px;        /* extra height */
  }

}

.hero h1{
  text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    0 0 20px rgba(0,91,234,0.8),
    0 0 30px rgba(0,91,234,0.6);
}

.hero p{
  text-shadow:
    0 0 6px rgba(255,255,255,0.5);
}
  
/* PLANS BG */
.plans-bg{
  background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)),
    url('./Banner.jpg');
  background-size:cover;
  padding:40px 0;
}

.container{text-align:center;padding:20px;}

.toggle button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  background:#dfe7ff;
}

.toggle .active{
  background:#005bea;
  color:white;
}

/* CARDS */
.plans-wrapper{
  position:relative;
  max-width:1200px;
  margin:auto;
}
/* HORIZONTAL SCROLL */
.plans{
  display:flex;
  gap:16px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:30px 40px;
  align-items:stretch;
  scroll-behavior:smooth;
}

.plans::-webkit-scrollbar{
  display:none;
}

.hero, .plans-bg, .form-bg{
  background-repeat:no-repeat;
  background-size:cover;
  background-position:center;
}

  .cta, .select-btn{
  box-shadow:
    0 0 10px rgba(0,91,234,0.5),
    0 0 20px rgba(0,91,234,0.3);
  transition:0.3s;
}

.cta:hover, .select-btn:hover{
  box-shadow:
    0 0 15px rgba(0,91,234,0.8),
    0 0 30px rgba(0,91,234,0.5);
}

  .card.popular{
  border:2px solid #ff6f00;
  box-shadow:
    0 0 15px rgba(255,111,0,0.6),
    0 0 30px rgba(255,111,0,0.3);
}

 
.card{
  background:white;
  color:black;
  cursor:pointer;
  padding:20px;
  border-radius:16px;
  width:260px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  flex:0 0 260px;
  scroll-snap-align:center;
 
}

.card.popular{
  border:3px solid orange;
}

.card.selected{
  border:3px solid #2e7d32;
  box-shadow:0 0 12px rgba(46,125,50,0.4);
  transform:scale(1.08);
  z-index:2;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
.price{
  font-size:26px;
  font-weight:bold;
  color:#003a8f;
}

.tabs{
  position:relative;
  display:flex;
  justify-content:center;
  gap:5px;
  background:rgba(255,255,255,0.1);
  padding:6px;
  border-radius:30px;
  width:max-content;
  margin:20px auto;
  backdrop-filter:blur(10px);
}

/* SLIDER */
.tab-slider{
  position:absolute;
  top:5px;
  left:5px;
  height:calc(100% - 10px);
  width:80px;
  background:white;
  border-radius:20px;
  transition:0.3s ease;
  box-shadow:0 0 10px rgba(255,255,255,0.6);
  z-index:0;
}

/* BUTTON */
.tab{
  position:relative;
  z-index:1;
  padding:8px 16px;
  border:none;
  border-radius:20px;
  background:transparent;
  color:white;
  cursor:pointer;
  font-size:14px;
}

/* ACTIVE TEXT */
.tab.active{
  color:#003a8f;
  font-weight:bold;
}

.tab:hover{
  background:rgba(255,255,255,0.2);
}
  
.select-btn{
  margin-top:10px;
  width:100%;
  background:#003a8f;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
}

.carousel-controls{
  text-align:center;
  margin-bottom:10px;
}

.carousel-controls button{
  padding:8px 12px;
  margin:0 5px;
  border:none;
  border-radius:6px;
  background:#003a8f;
  color:white;
  cursor:pointer;
}

.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  z-index:100;

  background:rgba(0,0,0,0.6);
  color:white;
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* LEFT / RIGHT */
.carousel-btn.left{
  left:-10px;   /* slightly outside */
}

.carousel-btn.right{
  right:-10px;
}

/* HOVER EFFECT */
.carousel-btn{
  
}

.carousel-btn:hover{
  background:#003a8f;
}

@media(max-width:768px){
  .carousel-btn{
    display:none;
  }
}
}
  
/* SELECTED PLAN */
.selected-box{
  display:none;
  background:#dff0d8;
  color:#2e7d32;
  padding:12px;
  border-radius:8px;
  max-width:500px;
  margin:20px auto;
}

/* FORM BG */
.form-bg{
  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url('./Network.jpg');
  background-size:cover;
  padding:50px 0;
}

/* FORM */
.form{
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  color:black;
  padding:25px;
  border-radius:14px;
  max-width:400px;
  margin:auto;
  box-shadow:
    0 0 20px rgba(0,91,234,0.3),
    0 10px 30px rgba(0,0,0,0.3);
}

  body::before{
  content:"";
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,91,234,0.2), transparent),
    radial-gradient(circle at 70% 70%, rgba(255,111,0,0.15), transparent);
  z-index:-1;
}
  
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ddd;
}

button{
  background:#003a8f;
  color:white;
  border:none;
}

footer{
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <img src="./bsnl-logo.png" class="logo">
    <b>Bharat Fibre Chennai</b>
  </div>
  <a href="https://wa.me/919447072230" class="wa-btn">WhatsApp</a>
</div>


  
<!-- HERO -->
<div class="hero">
  <h1>.</h1>
  <p>.</p>
</div>

<!-- PLANS -->
<div class="plans-bg">
<div class="container">

<h2>Choose Your Fibre Plan</h2>
<div class="tabs" id="tabs">
  <div class="tab-slider" id="tabSlider"></div>

  <button class="tab active" onclick="setType('monthly',this)">Monthly</button>
  <button class="tab" onclick="setType('quarterly',this)">Quarterly</button>
  <button class="tab" onclick="setType('half',this)">Half-Yearly</button>
  <button class="tab" onclick="setType('yearly',this)">Yearly</button>
</div>

<div class="plans-wrapper">

  <button class="carousel-btn left" onclick="scrollPlans(-1)">❮</button>

  <div class="plans" id="plans"></div>

  <button class="carousel-btn right" onclick="scrollPlans(1)">❯</button>

</div>

</div>
</div>
  
<div class="carousel-controls">
  <button onclick="scrollPlans(-1)">◀</button>
  <button onclick="scrollPlans(1)">▶</button>
</div>
  
<!-- SELECTED PLAN -->
<div id="selectedBox" class="selected-box">
Selected Plan: <span id="selectedText"></span>
</div>

<!-- FORM -->
<div class="form-bg">
<div class="container">

<div class="form" id="formSection">
<h3>Check Availability</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="area" placeholder="Detecting location...">
<input type="hidden" id="planInput">

<button onclick="submitForm()">Submit</button>
</div>

</div>
</div>

<footer>BSNL Bharat Fibre Chennai</footer>

<script>
let selectedPlan="";
let planType="monthly";
let userLat="",userLng="";

const plans=[
 {name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}];

function setType(t,el){

  planType = t;

  document.querySelectorAll(".tab").forEach(b=>{
    b.classList.remove("active");
  });

  el.classList.add("active");

  // MOVE SLIDER
  const slider = document.getElementById("tabSlider");
  slider.style.width = el.offsetWidth + "px";
  slider.style.left = el.offsetLeft + "px";

  render();
}

  window.addEventListener("load", ()=>{
  const activeTab = document.querySelector(".tab.active");
  const slider = document.getElementById("tabSlider");

  slider.style.width = activeTab.offsetWidth + "px";
  slider.style.left = activeTab.offsetLeft + "px";
});
  
function render(){
let c=document.getElementById("plans");
c.innerHTML="";

plans.forEach(p=>{
let price=p.price[planType];

c.innerHTML+=`
<div class="card ${p.popular?'popular':''}"
onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">
${p.popular?'<div style="color:orange;font-weight:bold;">Most Popular</div>':''}
<h3>${p.name}</h3>
<div class="price">₹${price}</div>
<p>${p.speed}</p>

<button class="select-btn"
onclick="event.stopPropagation(); selectPlan(this.closest('.card'),'${p.name}','${price}','${p.speed}')">
Select Plan
</button>
</div>`;
});
}

function scrollPlans(direction){
  const container = document.getElementById("plans");
  container.scrollBy({
    left: direction * 280,
    behavior: "smooth"
  });
}
function centerCard(el){
  const container = document.getElementById("plans");

  const card = el;
  const containerRect = container.getBoundingClientRect();
  const cardRect = card.getBoundingClientRect();

  const offset = cardRect.left - containerRect.left
                - (containerRect.width / 2)
                + (cardRect.width / 2);

  container.scrollBy({
    left: offset,
    behavior: "smooth"
  });
}
  
function selectPlan(el,n,p,s){

  selectedPlan = `${n} - ₹${p} (${s})`;

  // highlight
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");

  // show selected plan
  document.getElementById("selectedBox").style.display="block";
  document.getElementById("selectedText").innerText=selectedPlan;
  document.getElementById("planInput").value=selectedPlan;

  // 🔥 CENTER CARD
  centerCard(el);

  // OPTIONAL: scroll to form after slight delay
  setTimeout(()=>{
    document.getElementById("availability").scrollIntoView({
      behavior:"smooth"
    });
  }, 300);
}

render();

/* LOCATION */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(async pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

try{
let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
let data=await res.json();
document.getElementById("area").value=data.address.suburb||data.address.city||"Chennai";
}catch{}
});
}

/* SUBMIT */
async function submitForm(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let area=document.getElementById("area").value;
let plan=document.getElementById("planInput").value;

if(!name||!phone){alert("Fill details");return;}
if(!plan){alert("Select plan");return;}

await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({
name,phone,area,
lat:userLat,lng:userLng,
plan
})
});

window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0AArea:${area}%0APlan:${plan}`);
}
</script>

</body>
</html>
