<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1f4a;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:white;
  color:black;
}
.logo{height:40px;}

.wa-btn{
  background:#25D366;
  color:white;
  padding:8px 14px;
  border-radius:6px;
  text-decoration:none;
}

/* ================= HERO FIXED ================= */

.hero{
  width:100%;
  height:clamp(180px, 42vh, 420px);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#0b1f4a;
}

.hero-img{
  width:100%;
  height:100%;
  object-fit:contain;          /* 👈 KEY FIX */
  object-position:center;
}

/* Mobile fine-tune */
@media(max-width:768px){
  .hero{
    height:260px;
  }
  .hero-img{
    object-position:top center;
  }
}

/* ================= TABS ================= */

.tabs{
  display:flex;
  justify-content:center;
  margin:20px auto;
  gap:8px;
}

.tab{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#ffffff20;
  color:white;
  cursor:pointer;
}

.tab.active{
  background:white;
  color:#003a8f;
}

/* ================= CAROUSEL (UNCHANGED) ================= */

.plans-wrapper{
  position:relative;
  max-width:1100px;
  margin:auto;
}

.plans{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding:20px;
}

.plans::-webkit-scrollbar{display:none;}

.card{
  min-width:240px;
  background:white;
  color:black;
  border-radius:12px;
  padding:15px;
  text-align:center;
  cursor:pointer;
}

.card.selected{
  border:3px solid green;
}

/* ARROWS */
.carousel-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:black;
  color:white;
  border:none;
  padding:10px;
  cursor:pointer;
}
.carousel-btn.left{
  left:-20px;
}

.carousel-btn.right{
  right:-20px;
}
/* ================= SELECTED ================= */

.selected-box{
  display:none;
  text-align:center;
  background:#dff0d8;
  color:#2e7d32;
  padding:10px;
}

/* ================= FORM ================= */

.form-section{
  padding:30px;
  text-align:center;
}

.form{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  max-width:400px;
  margin:auto;
}

input,button{
  width:100%;
  padding:10px;
  margin-top:10px;
}

button{
  background:#003a8f;
  color:white;
  border:none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://jtommnchn-lab.github.io/bsnl-logo.png" class="logo">
  <a href="https://wa.me/919447072230" class="wa-btn">WhatsApp</a>
</div>

<!-- HERO -->
<div class="hero">
  <img src="https://jtommnchn-lab.github.io/bsnl-landing-page/banner.jpg" class="hero-img">
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="setType('monthly',this)">Monthly</button>
  <button class="tab" onclick="setType('quarterly',this)">Quarterly</button>
  <button class="tab" onclick="setType('half',this)">Half</button>
  <button class="tab" onclick="setType('yearly',this)">Yearly</button>
</div>

<!-- CAROUSEL (UNCHANGED) -->
<div class="plans-wrapper">
<button class="carousel-btn left" onclick="scrollPlans(-1)">◀</button>
<div class="plans" id="plans"></div>
<button class="carousel-btn right" onclick="scrollPlans(1)">▶</button>
</div>

<div id="selectedBox" class="selected-box">
Selected Plan: <span id="selectedText"></span>
</div>

<!-- FORM -->
<div class="form-section" id="formSection">
<div class="form">
<input id="name" placeholder="Name">
<input id="phone" placeholder="Mobile">
<input id="area" placeholder="Area">
<input type="hidden" id="planInput">
<button onclick="submitForm()">Submit</button>
</div>
</div>

<script>
let selectedPlan="",planType="monthly",userLat="",userLng="";

const plans=[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

function render(){
let c=document.getElementById("plans");
c.innerHTML="";
plans.forEach(p=>{
let price=p.price[planType];
c.innerHTML+=`
<div class="card" onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">
<h3>${p.name}</h3>
<h2>₹${price}</h2>
<p>${p.speed}</p>
<button onclick="event.stopPropagation();selectPlan(this.closest('.card'),'${p.name}','${price}','${p.speed}')">
Select</button>
</div>`;
});
}

function selectPlan(el,n,p,s){
selectedPlan=`${n} - ₹${p} (${s})`;
document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
el.classList.add("selected");

document.getElementById("selectedBox").style.display="block";
document.getElementById("selectedText").innerText=selectedPlan;
document.getElementById("planInput").value=selectedPlan;

document.getElementById("formSection").scrollIntoView({behavior:"smooth"});
}

function scrollPlans(dir){
document.getElementById("plans").scrollBy({left:dir*250,behavior:"smooth"});
}

function setType(t,el){
planType=t;
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
el.classList.add("active");
render();
}

render();

/* LOCATION */
if(navigator.geolocation){
navigator.geolocation.getCurrentPosition(pos=>{
userLat=pos.coords.latitude;
userLng=pos.coords.longitude;
});
}

/* SUBMIT */
async function submitForm(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let area=document.getElementById("area").value;
let plan=document.getElementById("planInput").value;

await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
method:"POST",
mode:"no-cors",
body:JSON.stringify({name,phone,area,lat:userLat,lng:userLng,plan})
});

window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0APlan:${plan}`);
}
</script>

</body>
</html>
