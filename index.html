function detectLocation(){
  const areaInput = document.getElementById("area");

  if(!navigator.geolocation){
    areaInput.value = "Chennai";
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;

    try{
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
      const data = await res.json();

      areaInput.value =
        data.address.suburb ||
        data.address.neighbourhood ||
        data.address.city ||
        "Chennai";
    } catch {
      areaInput.value = "Chennai";
    }
  });
}

function centerCard(el){
  const container = document.getElementById("plans");
  isAutoScrolling = true;
  const scrollLeft =
    el.offsetLeft -
    (container.offsetWidth / 2) +
    (el.offsetWidth / 2);
  container.scrollTo({
    left: scrollLeft,
    behavior: "smooth"
  });
  // stop flag after animation
  setTimeout(()=>{
    isAutoScrolling = false;
  }, 400);
}
  
function centerPopular(){
  const popularCard = document.querySelector(".popular");
  if(!popularCard) return;
  centerCard(popularCard);
  document.querySelectorAll(".card")
    .forEach(c=>c.classList.remove("selected"));
  popularCard.classList.add("selected");
}

function scrollPlans(dir){
  const container = document.getElementById("plans");
  const cardWidth = container.querySelector(".card").offsetWidth + 16;
  container.scrollBy({
    left: dir * cardWidth,
    behavior:"smooth"
  });
}

function autoSelectCenter(){
  const cards = document.querySelectorAll(".card");
  const container = document.getElementById("plans");
  let closest = null;
  let minDistance = Infinity;
  const center = container.offsetWidth / 2;

  cards.forEach(card=>{
    const cardCenter =
      card.offsetLeft - container.scrollLeft + (card.offsetWidth / 2);
    const dist = Math.abs(center - cardCenter);

    if(dist < minDistance){
      minDistance = dist;
      closest = card;
    }
  });

if(closest && !closest.classList.contains("selected")){
  closest.click();
}
}

    return `<img src="${ottLogos[app]}" style="height:22px;margin:2px">`;
  }).join("");

  document.getElementById("ottPreview").innerHTML = `

    ? Number(ottPlans[selectedOTT].price[planType])
    : 0;
  let total = base + ottPrice;
  document.getElementById("bottomPrice").innerHTML = `₹ ${total}`;
  document.getElementById("selectedText").innerHTML =
  `Total: ₹${total}<br>
   <span style="font-size:12px">
   Base ₹${base} ${ottPrice ? `+ OTT ₹${ottPrice}` : ""}
   </span>`;
}
  
function showApps(apps){
  const list = document.getElementById("appList");
  list.innerHTML = apps.map(app=>`<p>• ${app}</p>`).join("");
  document.getElementById("appPopup").style.display="flex";
}

function closePopup(){
  document.getElementById("appPopup").style.display="none";
}
  
function setType(type, el){
  planType = type;
  document.querySelectorAll(".duration-card")
    .forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  // ✅ RESET OTT
  selectedOTT = "none";
  selectedOTTName = "None";
  render();        // internet plans
  if(selectedBasePrice){
    renderOTT();   // only if plan already selected
  }
  updatePrice();   // always update price
}
  
function updateScale(){
  const cards = document.querySelectorAll(".card");
  const container = document.getElementById("plans");
  const center = container.offsetWidth / 2;
  cards.forEach(card=>{
    // ✅ DO NOT TOUCH SELECTED CARD
    if(card.classList.contains("selected")){
      card.style.transform = "scale(1.12)";
      card.style.opacity = "1";
      return;
    }
    const cardCenter =
      card.offsetLeft - container.scrollLeft + (card.offsetWidth / 2);
    const distance = Math.abs(center - cardCenter);
    let scale = Math.max(0.85, 1 - distance/600);
    let opacity = Math.max(0.4, 1 - distance/400);
    card.style.transform = `scale(${scale})`;
    card.style.opacity = opacity;
  });
}
  
async function submitForm(){
  // ✅ VALIDATION FIRST
  if(!validateForm()) return;
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let area = document.getElementById("area").value;
  let data = {
    Name: name,
    Phone: phone,
    Area: area,
    Latitude: userLat,
    Longitude: userLng,
    "Plan Type": planType,
    "Selected Plan": selectedPlanName,
    "OTT Selected": selectedOTTName,
    Date: getCurrentDate(),
    Source: "Website"
  };
  await fetch("https://script.google.com/macros/s/AKfycbw5JSijoiizpL4TgU9-vgEJuPvnC85xIUDWMYdvc3wA71-HNqVJMO2TOqugGdWvyWrlIQ/exec",{
    method:"POST",
    mode:"no-cors",
    body: JSON.stringify(data)
  });

  let msg =
`Name: ${name}
Phone: ${phone}
Plan: ${selectedPlanName}
OTT: ${selectedOTTName}
Type: ${planType}`;
  window.open(`https://wa.me/919447072230?text=${encodeURIComponent(msg)}`);
}
  
function checkFormReady(){
  const btn = document.querySelector(".bottom-bar button");
  if(selectedPlanName && 
     document.getElementById("name").value &&
     /^[6-9]\d{9}$/.test(document.getElementById("phone").value)){
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}
  
function validateForm(){
  let isValid = true;
  const name = document.getElementById("name");
  const phone = document.getElementById("phone");
  const nameError = document.getElementById("nameError");
  const phoneError = document.getElementById("phoneError");
  // reset
  name.classList.remove("error");
  phone.classList.remove("error");
  nameError.innerText = "";
  phoneError.innerText = "";
  // Name validation
  if(!name.value.trim()){
    name.classList.add("error");
    nameError.innerText = "Please enter your name";
    name.focus();
    isValid = false;
  }
  // Phone validation
  else if(!/^[6-9]\d{9}$/.test(phone.value)){
    phone.classList.add("error");
    phoneError.innerText = "Enter valid 10-digit mobile number";
    phone.focus();
    isValid = false;
  }
  if(!selectedPlanName){
  alert("Please select a plan first");
  return false;
}
  return isValid;
}
  
</script>
