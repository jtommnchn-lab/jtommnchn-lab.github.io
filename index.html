<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Bharat Fibre Chennai</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f3f6fb;
}

/* HEADER */
.header{
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.header img{
  height:48px;
}

.header-text{
  color:#003a8f;
  font-weight:600;
}

/* HERO */
.hero{
  background:
    linear-gradient(rgba(0,58,143,0.8), rgba(0,91,234,0.9)),
    url('https://images.unsplash.com/photo-1504384308090-c894fdcc538d');
  background-size:cover;
  background-position:center;
  color:white;
  text-align:center;
  padding:90px 20px;
}

.hero h1{
  font-size:38px;
  margin:0;
}

.hero p{
  margin-top:10px;
  opacity:0.9;
  font-size:16px;
}

.cta{
  display:inline-block;
  margin-top:25px;
  background:#ff6f00;
  color:white;
  padding:14px 26px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* FEATURES */
.features{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:-30px;
  background:white;
  padding:16px;
  border-radius:12px;
  max-width:800px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

/* SECTION BG */
.section{
  background:
    linear-gradient(#ffffff,#eef3ff),
    url('https://images.unsplash.com/photo-1558494949-ef010cbdcc31');
  background-size:cover;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

/* TOGGLE */
.toggle{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.toggle button{
  padding:10px 14px;
  border:none;
  background:#dfe7ff;
  border-radius:6px;
  cursor:pointer;
}

.toggle .active{
  background:#003a8f;
  color:white;
}

/* CARDS */
.plans{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.card{
  background:rgba(255,255,255,0.95);
  padding:22px;
  border-radius:16px;
  width:260px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card.popular{
  border:2px solid #ff6f00;
}

.card.selected{
  border:2px solid #2e7d32;
}

.badge{
  background:#ff6f00;
  color:white;
  font-size:12px;
  padding:4px 8px;
  border-radius:4px;
}

/* FORM */
.form{
  background:white;
  padding:25px;
  border-radius:12px;
  max-width:400px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ddd;
}

button{
  background:#003a8f;
  color:white;
  font-weight:bold;
  border:none;
}

/* FOOTER */
footer{
  background:#003a8f;
  color:white;
  text-align:center;
  padding:15px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="bsnl-logo.png">
  <div class="header-text">Chennai Bharat Fibre Service</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Ultra Fast BSNL Fibre</h1>
  <p>Unlimited Data | Free Voice | Trusted Network</p>
  <a class="cta" href="https://wa.me/919447072230">📲 Book Now</a>
</div>

<!-- FEATURES -->
<div class="features">
  <div>⚡ Up to 250 Mbps</div>
  <div>📶 Unlimited Data</div>
  <div>📞 Free Voice Calls</div>
</div>

<!-- PLANS -->
<div class="section">
<div class="container">

<h2 style="text-align:center;">Choose Your Plan</h2>

<div class="toggle">
<button onclick="setType('monthly',this)" class="active">Monthly</button>
<button onclick="setType('quarterly',this)">Quarterly</button>
<button onclick="setType('half',this)">Half-Yearly</button>
<button onclick="setType('yearly',this)">Yearly</button>
</div>

<div class="plans" id="plans"></div>

</div>
</div>

<!-- FORM -->
<div class="container">
<h2 style="text-align:center;">Check Availability</h2>

<div class="form">
<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Mobile Number">
<input id="area" placeholder="Your Area">
<button onclick="submitForm()">Submit Request</button>
</div>
</div>

<footer>
BSNL Bharat Fibre Chennai | 9447072230
</footer>

<a class="whatsapp" href="https://wa.me/919447072230">💬</a>

<script>
let selectedPlan="";
let type="monthly";

const plans=[
{name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

function setType(t,el){
type=t;
document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
render();
}

function render(){
let c=document.getElementById("plans");
c.innerHTML="";
plans.forEach(p=>{
let price=p.price[type];
c.innerHTML+=`
<div class="card ${p.popular?'popular':''}" onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">
${p.popular?'<div class="badge">Most Popular</div>':''}
<h3>${p.name}</h3>
<h2>₹${price}</h2>
<p>${p.speed}</p>
</div>`;
});
}

function selectPlan(el,n,p,s){
selectedPlan=`${n} - ₹${p} (${s})`;
document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
el.classList.add("selected");
}

render();

/* LOCATION */
if(navigator.geolocation){
 navigator.geolocation.getCurrentPosition(async pos=>{
  userLat=pos.coords.latitude;
  userLng=pos.coords.longitude;

  try{
    let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
    let data=await res.json();

    document.getElementById("area").value =
      data.address.suburb || data.address.city || "Chennai";
  }catch{
    document.getElementById("area").value="Chennai";
  }
 });
}

/* SUBMIT */
async function submitForm(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 let area=document.getElementById("area").value;

 if(!name||!phone){alert("Fill details");return;}
 if(!selectedPlan){alert("Select a plan");return;}

 await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify({
    name,phone,area,
    lat:userLat,lng:userLng,
    planType,selectedPlan
  })
 });

 window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0AArea:${area}%0APlan:${selectedPlan}`);
}
</script>

</body>
</html>
