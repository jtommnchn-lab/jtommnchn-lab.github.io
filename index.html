<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSNL Fibre Chennai</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#f5f7fb;
}

/* HERO */
.hero {
  background:
    linear-gradient(rgba(0,42,110,0.75), rgba(0,91,234,0.85)),
    url('https://images.unsplash.com/photo-1593642532871-8b12e02d091c');
  background-size:cover;
  background-position:center;
  color:white;
  text-align:center;
  padding:80px 20px;
}

.hero h1 {font-size:34px;margin:0;}
.hero p {opacity:0.9;}

.cta-btn {
  background:#25D366;
  color:white;
  padding:14px 24px;
  border-radius:8px;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
  font-weight:bold;
}

/* FEATURE STRIP */
.features {
  display:flex;
  justify-content:center;
  gap:20px;
  background:white;
  padding:15px;
  margin-top:-30px;
  border-radius:12px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

/* CONTAINER */
.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

/* TOGGLE */
.toggle {
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.toggle button {
  padding:10px 14px;
  border:1px solid #ddd;
  background:white;
  cursor:pointer;
  border-radius:6px;
}

.toggle button.active {
  background:#005bea;
  color:white;
}

/* PLANS */
.plans {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
}

.card {
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:16px;
  width:260px;
  text-align:center;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
}

.card.popular {
  border:2px solid #005bea;
}

.card.selected {
  border:2px solid #25D366;
}

.badge {
  background:#005bea;
  color:white;
  padding:4px 8px;
  border-radius:4px;
  font-size:12px;
}

/* FORM */
.form-box {
  background:white;
  padding:25px;
  border-radius:12px;
  max-width:400px;
  margin:auto;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

input,button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ddd;
}

button {
  background:#005bea;
  color:white;
  font-weight:bold;
  border:none;
}

/* FOOTER */
footer {
  text-align:center;
  padding:15px;
  background:#111;
  color:white;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:14px;
  border-radius:50%;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Ultra Fast Fibre Internet in Chennai</h1>
  <p>Unlimited Data | Free Voice | Lightning Speed</p>
  <a class="cta-btn" href="https://wa.me/919447072230">📲 WhatsApp Now</a>
</div>

<!-- FEATURES -->
<div class="features">
  <div>⚡ Up to 250 Mbps</div>
  <div>📶 Unlimited Data</div>
  <div>📞 Free Voice Calls</div>
</div>

<!-- PLANS -->
<div class="container">
  <h2 style="text-align:center;">Choose Your Plan</h2>

  <div class="toggle">
    <button onclick="setType('monthly',this)" class="active">Monthly</button>
    <button onclick="setType('quarterly',this)">Quarterly</button>
    <button onclick="setType('half',this)">Half-Yearly</button>
    <button onclick="setType('yearly',this)">Yearly</button>
  </div>

  <div class="plans" id="plansContainer"></div>
</div>

<!-- FORM -->
<div class="container">
  <h2 style="text-align:center;">Check Availability</h2>

  <div class="form-box">
    <input id="name" placeholder="Your Name">
    <input id="phone" placeholder="Mobile Number">
    <input id="area" placeholder="Detecting location...">
    <button onclick="submitForm()">Submit</button>
  </div>
</div>

<footer>
  BSNL Fibre Chennai | WhatsApp: 9447072230
</footer>

<a class="whatsapp" href="https://wa.me/919447072230">💬</a>

<script>
let selectedPlan="";
let planType="monthly";
let userLat="", userLng="";

const plans=[
 {name:"Fibre Entry",speed:"25 Mbps",price:{monthly:333,quarterly:1178,half:2356,yearly:4712}},
 {name:"Ghar Ka WiFi",speed:"40 Mbps",price:{monthly:399,quarterly:1413,half:2826,yearly:5652}},
 {name:"Fibre Basic",speed:"60 Mbps",price:{monthly:499,quarterly:1767,half:3533,yearly:7066}},
 {name:"Fibre Basic Plus",speed:"100 Mbps",price:{monthly:599,quarterly:2121,half:4241,yearly:8482},popular:true},
 {name:"Fibre TB",speed:"150 Mbps",price:{monthly:799,quarterly:2829,half:5657,yearly:9900}},
 {name:"Fibre Value Plus",speed:"150 Mbps",price:{monthly:849,quarterly:3006,half:6011,yearly:10520}},
 {name:"Fibre Premium Plus",speed:"250 Mbps",price:{monthly:1299,quarterly:4602,half:9197,yearly:18394}}
];

function setType(type,el){
  planType=type;
  document.querySelectorAll(".toggle button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  renderPlans();
}

function renderPlans(){
  let container=document.getElementById("plansContainer");
  container.innerHTML="";

  plans.forEach(p=>{
    let price=p.price[planType];

    container.innerHTML+=`
      <div class="card ${p.popular?'popular':''}"
      onclick="selectPlan(this,'${p.name}','${price}','${p.speed}')">

      ${p.popular?'<div class="badge">Most Popular</div>':''}

      <h3>${p.name}</h3>
      <h2>₹${price}</h2>
      <p>${p.speed}</p>
      </div>
    `;
  });
}

function selectPlan(el,name,price,speed){
  selectedPlan=`${name} - ₹${price} (${speed})`;
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("selected"));
  el.classList.add("selected");
}

renderPlans();

/* LOCATION */
if(navigator.geolocation){
 navigator.geolocation.getCurrentPosition(async pos=>{
  userLat=pos.coords.latitude;
  userLng=pos.coords.longitude;

  try{
    let res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${userLat}&lon=${userLng}&format=json`);
    let data=await res.json();

    document.getElementById("area").value =
      data.address.suburb || data.address.city || "Chennai";
  }catch{
    document.getElementById("area").value="Chennai";
  }
 });
}

/* SUBMIT */
async function submitForm(){
 let name=document.getElementById("name").value;
 let phone=document.getElementById("phone").value;
 let area=document.getElementById("area").value;

 if(!name||!phone){alert("Please fill details");return;}
 if(!selectedPlan){alert("Please select a plan");return;}

 await fetch("https://script.google.com/macros/s/AKfycbwIicLwVFLG3UNOGYp3FUuMIrfFtkfEeLrrG4k9QPhh3yflFDi0t4B7pki6DL-cKy-aig/exec",{
  method:"POST",
  mode:"no-cors",
  body:JSON.stringify({
    name,phone,area,
    lat:userLat,lng:userLng,
    planType,selectedPlan
  })
 });

 window.open(`https://wa.me/919447072230?text=Name:${name}%0APhone:${phone}%0AArea:${area}%0APlan:${selectedPlan}`);
}
</script>

</body>
</html>
